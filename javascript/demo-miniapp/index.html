<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0F172A">
  <title>Tween Mart</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <div class="header-content">
        <div class="logo">
          <div class="logo-icon">🛒</div>
          <h1>Tween Mart</h1>
        </div>
        <button class="icon-btn trace-toggle" id="traceToggle" title="Dev Trace">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
      <!-- Home Screen -->
      <section class="screen active" id="screenHome">
        <div class="welcome-banner" id="welcomeBanner">
          <div class="welcome-text">
            <span class="welcome-label">Welcome back</span>
            <span class="welcome-name" id="userName">...</span>
          </div>
          <div class="balance-pill" id="balancePill">
            <span class="balance-label">Balance</span>
            <span class="balance-value" id="balanceValue">--</span>
          </div>
        </div>

        <div class="section-header">
          <h2>Featured</h2>
        </div>
        <div class="product-grid" id="featuredGrid"></div>

        <div class="section-header">
          <h2>All Products</h2>
        </div>
        <div class="product-list" id="productList"></div>
      </section>

      <!-- Cart Screen -->
      <section class="screen" id="screenCart">
        <h2 class="screen-title">Your Cart</h2>
        <div class="cart-items" id="cartItems">
          <div class="empty-state">
            <div class="empty-icon">🛒</div>
            <p>Your cart is empty</p>
            <button class="btn-primary" onclick="navigateTo('home')">Browse Products</button>
          </div>
        </div>
        <div class="cart-footer" id="cartFooter" style="display:none">
          <div class="cart-total">
            <span>Total</span>
            <span id="cartTotal">$0.00</span>
          </div>
          <button class="btn-primary btn-large" id="checkoutBtn" onclick="checkout()">
            Pay with Tween
          </button>
        </div>
      </section>

      <!-- Wallet Screen -->
      <section class="screen" id="screenWallet">
        <h2 class="screen-title">Wallet</h2>
        <div class="wallet-card">
          <div class="wallet-balance">
            <span class="wallet-label">Available Balance</span>
            <span class="wallet-amount" id="walletAmount">--</span>
          </div>
          <div class="wallet-actions">
            <button class="wallet-action" onclick="sendMoney()">
              <div class="action-icon">💸</div>
              <span>Send</span>
            </button>
            <button class="wallet-action" onclick="sendGift()">
              <div class="action-icon">🎁</div>
              <span>Gift</span>
            </button>
            <button class="wallet-action" onclick="openGift()">
              <div class="action-icon">🎉</div>
              <span>Open</span>
            </button>
          </div>
        </div>

        <div class="section-header">
          <h3>Actions</h3>
        </div>
        <div class="action-list">
          <button class="action-row" onclick="refreshBalance()">
            <span>🔄 Refresh Balance</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
          </button>
          <button class="action-row" onclick="requestScopeDemo()">
            <span>🔐 Request Payment Scope</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
          </button>
          <button class="action-row" onclick="getScopes()">
            <span>📋 View Current Scopes</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
          </button>
        </div>
      </section>

      <!-- Profile Screen -->
      <section class="screen" id="screenProfile">
        <h2 class="screen-title">Profile</h2>
        <div class="profile-card">
          <div class="profile-avatar" id="profileAvatar">?</div>
          <div class="profile-info">
            <span class="profile-name" id="profileName">Loading...</span>
            <span class="profile-id" id="profileId">--</span>
          </div>
        </div>

        <div class="section-header">
          <h3>Storage Demo</h3>
        </div>
        <div class="storage-demo">
          <div class="input-row">
            <input type="text" id="storageKey" placeholder="Key (e.g. favorites)" value="favorites">
            <input type="text" id="storageValue" placeholder="Value (e.g. [\"ma_1\"])">
          </div>
          <div class="button-row">
            <button class="btn-secondary" onclick="storageGet()">Get</button>
            <button class="btn-secondary" onclick="storageSet()">Set</button>
            <button class="btn-danger" onclick="storageDelete()">Delete</button>
          </div>
          <div class="storage-result" id="storageResult"></div>
        </div>

        <div class="section-header">
          <h3>App Lifecycle</h3>
        </div>
        <div class="action-list">
          <button class="action-row" onclick="minimizeApp()">
            <span>⬇️ Minimize App</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
          </button>
          <button class="action-row" onclick="closeApp()">
            <span>❌ Close App</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
          </button>
        </div>

        <div class="section-header">
          <h3>Share</h3>
        </div>
        <div class="action-list">
          <button class="action-row" onclick="shareProduct()">
            <span>💬 Share Product via Message</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
          </button>
        </div>
      </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-screen="home" onclick="navigateTo('home')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <span>Home</span>
      </button>
      <button class="nav-item" data-screen="cart" onclick="navigateTo('cart')">
        <div class="nav-badge" id="cartBadge">0</div>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
        <span>Cart</span>
      </button>
      <button class="nav-item" data-screen="wallet" onclick="navigateTo('wallet')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
        <span>Wallet</span>
      </button>
      <button class="nav-item" data-screen="profile" onclick="navigateTo('profile')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        <span>Profile</span>
      </button>
    </nav>

    <!-- Trace Console -->
    <div class="trace-panel" id="tracePanel">
      <div class="trace-header">
        <span>TMCP Trace</span>
        <button class="trace-clear" onclick="clearTrace()">Clear</button>
      </div>
      <div class="trace-logs" id="traceLogs"></div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
      <span class="toast-icon" id="toastIcon">✅</span>
      <span class="toast-message" id="toastMessage"></span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
